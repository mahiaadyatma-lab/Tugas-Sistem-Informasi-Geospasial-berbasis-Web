<!DOCTYPE html>
<html>
<head>
    <title>Mini WebGIS</title>
    <style>
        #map {
            width: 100%;
            height: 400px;
            background: linear-gradient(to bottom, lightblue, lightgreen);
            position: relative;
            border: 1px solid black;
        }

        .marker {
            width: 12px;
            height: 12px;
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h2>Mini WebGIS Sederhana</h2>

<button id="btnAdd">Tambah Marker</button>
<button id="btnClear">Hapus Semua</button>
<button id="btnToggle">Toggle Layer</button>

<div id="map"></div>

<script>
    let map = document.getElementById("map");
    let visible = true;

    // class marker (dibikin sederhana aja)
    class Marker {
        constructor(color) {
            this.el = document.createElement("div");
            this.el.className = "marker";

            this.el.style.left = Math.random() * 380 + "px";
            this.el.style.top = Math.random() * 380 + "px";
            this.el.style.backgroundColor = color;

            this.el.addEventListener("click", function() {
                alert("Marker clicked!");
            });
        }

        addTo(map) {
            map.appendChild(this.el);
        }
    }

    // tombol tambah marker
    document.getElementById("btnAdd").addEventListener("click", function() {

        let colors = ["red", "blue", "green"];
        let color = colors[Math.floor(Math.random() * colors.length)];

        let m = new Marker(color);
        m.addTo(map);
    });

    // tombol clear marker
    document.getElementById("btnClear").addEventListener("click", function() {
        map.innerHTML = "";
    });

    // tombol toggle layer
    document.getElementById("btnToggle").addEventListener("click", function() {
        visible = !visible;

        if (visible) {
            map.style.display = "block";
        } else {
            map.style.display = "none";
        }
    });

</script>

</body>
</html>
