<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGIS DIY</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial, sans-serif;
        }

        /* =====================================
           MAP
        ===================================== */

        #map{
            height:100vh;
            width:100%;
        }

        /* =====================================
           INFO PANEL
        ===================================== */

        .info-panel{

            position:absolute;

            top:10px;
            right:10px;

            z-index:1000;

            background:white;

            padding:15px;

            border-radius:10px;

            box-shadow:0 0 15px rgba(0,0,0,0.3);

            width:280px;
        }

        .info-panel h2{
            margin-top:0;
            color:#2c3e50;
        }

        /* =====================================
           LEGENDA
        ===================================== */

        .legend{
            margin-top:15px;
        }

        .legend-item{
            display:flex;
            align-items:center;
            margin-bottom:10px;
        }

        .legend-color{
            width:18px;
            height:18px;
            margin-right:10px;
            border:1px solid black;
        }

        .raster-color{
            background:linear-gradient(
                to right,
                #2ecc71,
                #f1c40f,
                #e74c3c
            );
        }

        .vector-color{
            background:#3498db;
        }

    </style>

</head>

<body>

    <!-- =====================================
         INFO PANEL
    ====================================== -->

    <div class="info-panel">

        <h2>WebGIS DIY</h2>

        <p>
            Visualisasi data raster dan vektor
            menggunakan layanan OGC Services
            berbasis GeoServer dan Leaflet.
        </p>

        <ul>
            <li>WMS Raster DIY</li>
            <li>WFS Kecamatan Sleman</li>
            <li>Leaflet JS</li>
        </ul>

        <hr>

        <div id="detail">

            Klik wilayah kecamatan
            untuk melihat informasi.

        </div>

        <!-- LEGENDA -->

        <div class="legend">

            <h3>Legenda</h3>

            <div class="legend-item">

                <div class="legend-color raster-color"></div>

                <span>Raster DIY (WMS)</span>

            </div>

            <div class="legend-item">

                <div class="legend-color vector-color"></div>

                <span>Kecamatan Sleman (WFS)</span>

            </div>

        </div>

    </div>

    <!-- =====================================
         MAP
    ====================================== -->

    <div id="map"></div>

    <!-- =====================================
         LEAFLET JS
    ====================================== -->

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>

        // =====================================
        // 1. INISIALISASI MAP
        // =====================================

        var map = L.map('map').setView(
            [-7.7956, 110.3695],
            11
        );

        // =====================================
        // 2. BASEMAP OPENSTREETMAP
        // =====================================

        var osm = L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            attribution:'© OpenStreetMap'
        }).addTo(map);

        // =====================================
        // 3. BASEMAP ESRI
        // =====================================

        var esri = L.tileLayer(
        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
        {
            attribution:'Tiles © Esri'
        });

        // =====================================
        // 4. WMS RASTER
        // =====================================

        var wmsLayer = L.tileLayer.wms(
        'http://localhost:8080/geoserver/wms',
        {

            layers:'DIY:Peta_Raster_DIY',

            format:'image/png',

            transparent:true,

            attribution:'GeoServer WMS'

        }).addTo(map);

        // =====================================
        // 5. URL WFS
        // =====================================

        var geoServerUrl =

        'http://localhost:8080/geoserver/ows?' +

        'service=WFS&' +

        'version=1.0.0&' +

        'request=GetFeature&' +

        'typeName=Kabupaten_Sleman:Kecamatan_Sleman&' +

        'outputFormat=application/json';

        // =====================================
        // 6. MEMANGGIL DATA WFS
        // =====================================

        console.log(
            "Meminta data dari:",
            geoServerUrl
        );

        $.getJSON(geoServerUrl, function(data){

            console.log(data);

            L.geoJson(data, {

                // STYLE VECTOR

                style:function(feature){

                    return{

                        color:"#2c3e50",

                        weight:2,

                        fillColor:"#3498db",

                        fillOpacity:0.5

                    };

                },

                // INTERAKSI FITUR

                onEachFeature:function(feature, layer){

                    // TOOLTIP

                    layer.bindTooltip(

                        feature.properties.WADMKC ||

                        "Wilayah"

                    );

                    // KLIK

                    layer.on('click', function(){

                        var properti =
                        feature.properties;

                        document.getElementById(
                            'detail'
                        ).innerHTML =

                        "<h3>Informasi Wilayah</h3>" +

                        "<b>Kecamatan:</b> " +

                        (properti.WADMKC ||
                        "Tidak Ada Data")

                        +

                        "<br><b>Kabupaten:</b> " +

                        (properti.WADMKK ||
                        "Tidak Ada Data");

                    });

                }

            }).addTo(map);

        });

        // =====================================
        // 7. LAYER CONTROL
        // =====================================

        var baseMaps = {

            "OpenStreetMap":osm,

            "Esri Satellite":esri

        };

        var overlayMaps = {

            "Raster DIY (WMS)":wmsLayer

        };

        L.control.layers(
            baseMaps,
            overlayMaps
        ).addTo(map);

        // =====================================
        // 8. SCALE BAR
        // =====================================

        L.control.scale().addTo(map);

    </script>

</body>
</html>
